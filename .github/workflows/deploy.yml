name: Deploy to Ubuntu VM

# Uncomment the push section if you want to trigger the workflow on push to the main branch
# on:
#   push:
#     branches:
#       - main
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          # Saved as 'deploy_key' to support both RSA and ED25519 key formats
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy code to Ubuntu VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
          set -e

          # 1. Navigate to your project directory on the VM
          # CHANGE THIS to your actual path (e.g., /home/ubuntu/mricube-hubspot-integration)
          cd /home/ubuntu/ServiceM8-Hubspot-Integration/serviceM8-hubspot-integration$

          # 2. Pull the latest code from your repository
          git pull origin main

          # 3. Install production dependencies
          npm ci --production

          # 4. Restart or start the application using PM2
          # CHANGE 'mri_cube_server' to your actual PM2 application name
          pm2 restart serviceM8-hubspot-integration || pm2 start ecosystem.config.js

          echo "Deployment to Ubuntu VM completed successfully"
          EOF